<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Título</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1.25rem;
      background: #111;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
    }

    .logo span { color: #85B7EB; }

    .divider {
      width: 1px;
      height: 16px;
      background: #333;
    }

    .label {
      font-size: 0.75rem;
      color: #666;
    }

    .btn-pdf {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #ccc;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.4rem 0.85rem;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn-pdf:hover {
      background: #222;
      border-color: #555;
      color: #fff;
    }

    .btn-pdf svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
    }

    .frame-wrap {
      flex: 1;
      padding: 0.75rem;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <span class="logo">E-<span>Título</span></span>
      <div class="divider"></div>
      <span class="label">Protótipo de Alta Fidelidade</span>
    </div>
    <a class="btn-pdf" href="prototipo.pdf" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <polyline points="9 15 12 18 15 15"/>
      </svg>
      Baixar PDF
    </a>
  </div>

  <div class="frame-wrap">
    <iframe
      src="https://embed.figma.com/proto/k7b3E9stMRnJLfdgA7dCeM/E-Titulo?node-id=935-2957&p=f&scaling=min-zoom&content-scaling=fixed&page-id=935%3A2831&starting-point-node-id=935%3A2832&embed-host=share"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
